<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Well Adjusted Chiropractic — Day 2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #3d5c7d;
    --gold:    #bda054;
    --gold-dk: #d8b764;
    --parch:   #F4F1EB;
    --white:   #FFFFFF;
    --muted:   #849caf;
    --body:    #4A4A4A;
  }

  html, body {
    height: 100%;
    background: var(--parch);
    font-family: 'Jost', sans-serif;
    overflow: hidden;
  }

  /* BACKGROUND TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 100%, rgba(197,162,93,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 10%, rgba(31,45,61,0.03) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* GOLD LINES DECORATION */
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(to bottom, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
    opacity: 0.3;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px 80px;
    gap: 0;
  }

  /* LOGO */
  .logo {
    width: 170px;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(-16px);
    animation: fadeUp 0.8s ease 0.1s forwards;
  }

  /* GREETING */
  .greeting {
    text-align: center;
    max-width: 520px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-dk);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.3s forwards;
  }

  .welcome-line {
    font-family: 'Jost', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: #333333;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.45s forwards;
  }

  .patient-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(56px, 9vw, 84px);
    font-weight: 400;
    color: var(--navy);
    line-height: 1.0;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }

  .patient-name span {
    color: var(--gold-dk);
    font-style: italic;
  }

  /* DIVIDER */
  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 28px auto;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.9s forwards;
  }

  .sub-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.85;
    color: #444444;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.7s ease 1s forwards;
  }

  /* BUTTON */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: var(--navy);
    color: var(--gold);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 16px 44px;
    border-radius: 1px;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.2s forwards;
    transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }

  .btn:hover {
    background: var(--gold-dk);
    color: var(--white);
    transform: translateY(-1px);
  }

  .btn svg {
    width: 14px;
    height: 14px;
    transition: transform 0.2s ease;
  }

  .btn:hover svg { transform: translateX(3px); }

  /* TAGLINE */
  .tagline {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1.5px;
    color: rgba(31,45,61,0.25);
    font-style: italic;
    white-space: nowrap;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }

  .corner-tl, .corner-br {
    position: fixed;
    width: 60px;
    height: 60px;
    opacity: 0.15;
  }

  .corner-tl {
    top: 24px;
    right: 32px;
    border-top: 1px solid var(--gold);
    border-right: 1px solid var(--gold);
  }

  .corner-br {
    bottom: 24px;
    left: 32px;
    border-bottom: 1px solid var(--gold);
    border-left: 1px solid var(--gold);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<div class="corner-tl"></div>
<div class="corner-br"></div>

<div class="wrapper">
  <img
    src="https://assets.cdn.filesafe.space/uUGu9qTLe0cEAC8VRMtN/media/67b51f9c32195e2c50c7b5e6.png"
    alt="Well Adjusted Chiropractic"
    class="logo"
  >

  <div class="greeting">
    <p class="eyebrow">Day 2 · Report of Findings</p>
    <p class="welcome-line">Welcome back,</p>
    <h1 class="patient-name"><span id="firstName">—</span></h1>
    <div class="divider"></div>
    <p class="sub-text">
      Your doctor has reviewed your examination findings<br>
      and prepared your results. Please take a moment<br>
      to settle in — this appointment was designed for you.
    </p>
    <a id="beginBtn" href="#" class="btn">
      Begin
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</div>

<p class="tagline">Soft touch. Remarkable results.™</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const fullName = params.get('name') || '';
  const firstName = fullName.trim().split(' ')[0] || 'there';
  document.getElementById('firstName').textContent = firstName;
  document.getElementById('beginBtn').href = '/npc-video-page' + window.location.search;
</script>

</body>
</html>
